# vekna tmux configuration
# Keybindings use Alt (Meta) directly — no prefix required.
# The default Ctrl+B prefix is kept for infrequent operations.

# ── General ──────────────────────────────────────────────────────────────────

set -g default-terminal "screen-256color"
set -g history-limit 50000
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -s escape-time 0

# ── Pane navigation (Alt+hjkl) ───────────────────────────────────────────────

bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# ── Window navigation (Alt+number, Alt+[/]) ──────────────────────────────────

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

bind -n M-[ previous-window
bind -n M-] next-window

# ── Session navigation (Alt+( / Alt+)) ───────────────────────────────────────

bind -n M-( switch-client -p
bind -n M-) switch-client -n

# ── Window / pane management ─────────────────────────────────────────────────

bind -n M-n new-window -c "#{pane_current_path}"
bind -n M-s split-window -v -c "#{pane_current_path}"
bind -n M-v split-window -h -c "#{pane_current_path}"
bind -n M-x confirm-before -p "close pane? (y/n)" kill-pane
bind -n M-z resize-pane -Z
bind -n M-r command-prompt -I "#W" "rename-window '%%'"

# ── Status line ──────────────────────────────────────────────────────────────

set -g status on
set -g status-interval 5
set -g status-position bottom

set -g status-style "bg=colour235,fg=colour250"

set -g status-left-length 40
set -g status-left "#[fg=colour39,bold] #S #[fg=colour235,bg=colour235] "

set -g status-right-length 60
set -g status-right "#[fg=colour245]#(vekna status-bar)  #[fg=colour239]%H:%M "

setw -g window-status-format         "#[fg=colour245] #I:#W "
setw -g window-status-current-format "#[fg=colour255,bg=colour238,bold] #I:#W "

set -g pane-border-style        "fg=colour238"
set -g pane-active-border-style "fg=colour39"

set -g message-style "bg=colour235,fg=colour39"
